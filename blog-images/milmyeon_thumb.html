<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 800px; font-family: 'Noto Sans KR', sans-serif; position: relative; overflow: hidden; }

.bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }

.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(
    180deg,
    rgba(0,150,200,0.15) 0%,
    rgba(0,0,0,0.15) 35%,
    rgba(0,30,60,0.8) 100%
  );
}

.content {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 2;
  padding: 0 70px 80px;
  color: #fff;
}

.badge {
  position: absolute; top: 40px; left: 70px;
  background: rgba(255,255,255,0.95);
  color: #0088cc;
  font-family: 'Jua', sans-serif;
  font-size: 22px;
  padding: 10px 26px;
  border-radius: 30px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  z-index: 3;
}

.headline {
  font-family: 'Gaegu', cursive;
  font-size: 86px; font-weight: 700;
  line-height: 1.2;
  text-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 2px 4px rgba(0,0,0,0.4);
  margin-bottom: 12px;
}

.headline em {
  font-style: normal;
  color: #FFE44D;
}

.sub {
  font-family: 'Jua', sans-serif;
  font-size: 34px;
  color: rgba(255,255,255,0.95);
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  letter-spacing: 1px;
}
</style>
</head>
<body>
<img class="bg" src="https://ccnt256-code.github.io/blog-images/milmyeon_thumb_bg.jpg" alt="">
<div class="overlay"></div>
<div class="badge">🍜 2026 맛집 특집</div>
<div class="content">
  <div class="headline">울산 밀면 맛집<br><em>TOP 추천</em></div>
  <div class="sub">현지인이 인정한 그 맛! 2026 최신 정보</div>
</div>
</body>
</html>
