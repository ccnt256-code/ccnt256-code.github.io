<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 800px; overflow: hidden; font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
.container {
  width: 1200px; height: 800px;
  background: url('./ulsan-june-festival-2026-v4.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.dim {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.22);
}
.text-box {
  position: relative; z-index: 2;
  text-align: center;
  padding: 40px;
}
.main-title {
  font-size: 54px;
  font-weight: 900;
  color: #ffffff;
  text-shadow: 2px 3px 12px rgba(0,0,0,0.7);
  margin-bottom: 18px;
  line-height: 1.3;
}
.sub-title {
  font-size: 26px;
  font-weight: 400;
  color: rgba(255,255,255,0.95);
  text-shadow: 1px 2px 8px rgba(0,0,0,0.6);
  line-height: 1.4;
}
</style>
</head>
<body>
<div class="container">
  <div class="dim"></div>
  <div class="text-box">
    <div class="main-title">2026 울산 6월 축제 총정리</div>
    <div class="sub-title">수국 페스티벌 · 행사 일정 한눈에</div>
  </div>
</div>
</body>
</html>
